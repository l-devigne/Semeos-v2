

services:
  frontend:
    build: ./src/frontend
    ports:
      - "3001:80"

  backend:
    build: ./src/backend
    ports:
      - "8030:8000"
    environment:
      - DB_HOST=database
    depends_on:
      - database

  database:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=$POSTGRES_USER
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      - POSTGRES_DB=$POSTGRES_DB
    volumes:
      - ./data:/var/lib/postgresql/data
    

